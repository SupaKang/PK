<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>몬스터 스프라이트 샘플 - 고랭 & 나시고랭</title>
<style>
  body {
    background: #1a1a2e; color: #eee; font-family: 'Noto Sans KR', sans-serif;
    display: flex; flex-direction: column; align-items: center; padding: 40px;
  }
  h1 { color: #FFD700; margin-bottom: 40px; }
  .monsters { display: flex; gap: 80px; flex-wrap: wrap; justify-content: center; }
  .card {
    background: #16213e; border: 2px solid #0f3460; border-radius: 16px;
    padding: 30px; text-align: center; min-width: 280px;
  }
  .card h2 { color: #e94560; margin: 0 0 4px; }
  .card .type { color: #aaa; font-size: 14px; margin-bottom: 16px; }
  .sprites { display: flex; gap: 20px; justify-content: center; margin: 20px 0; }
  .sprites div { text-align: center; }
  .sprites canvas { image-rendering: pixelated; border: 1px solid #333; background: #0a0a1a; }
  .sprites label { display: block; font-size: 12px; color: #888; margin-top: 4px; }
  .stats { text-align: left; font-size: 13px; line-height: 1.8; }
  .stats span { color: #FFD700; }
  .desc { color: #ccc; font-size: 13px; margin: 12px 0; font-style: italic; }
</style>
</head>
<body>
<h1>몬스터 스프라이트 샘플</h1>
<div class="monsters" id="monsters"></div>

<script>
// ── sprite-generator 핵심 로직 인라인 ──

function hexToRgb(hex) {
  return { r: parseInt(hex.slice(1,3),16), g: parseInt(hex.slice(3,5),16), b: parseInt(hex.slice(5,7),16) };
}
function rgbToHex(r,g,b) {
  return '#'+[r,g,b].map(c=>Math.max(0,Math.min(255,Math.round(c))).toString(16).padStart(2,'0')).join('');
}
function lighten(hex, amt=0.3) { const {r,g,b}=hexToRgb(hex); return rgbToHex(r+(255-r)*amt, g+(255-g)*amt, b+(255-b)*amt); }
function darken(hex, amt=0.3) { const {r,g,b}=hexToRgb(hex); return rgbToHex(r*(1-amt), g*(1-amt), b*(1-amt)); }
function blendColors(h1, h2, t=0.5) { const a=hexToRgb(h1),b=hexToRgb(h2); return rgbToHex(a.r+(b.r-a.r)*t, a.g+(b.g-a.g)*t, a.b+(b.b-a.b)*t); }

function buildPalette(base, accent) {
  return {
    darkOutline: darken(base, 0.55), base, baseLight: lighten(base, 0.25),
    baseDark: darken(base, 0.25), accent, accentLight: lighten(accent, 0.3),
    accentDark: darken(accent, 0.2), highlight: lighten(base, 0.55),
    eye: '#111111', eyeShine: '#ffffff',
    belly: lighten(blendColors(base, accent, 0.4), 0.2),
  };
}

function setPixel(grid, x, y, val) { if(y>=0&&y<grid.length&&x>=0&&x<grid[0].length) grid[y][x]=val; }
function fillRect(grid,x,y,w,h,val) { for(let dy=0;dy<h;dy++) for(let dx=0;dx<w;dx++) setPixel(grid,x+dx,y+dy,val); }
function fillEllipse(grid,cx,cy,rx,ry,val) {
  for(let dy=-ry;dy<=ry;dy++) for(let dx=-rx;dx<=rx;dx++)
    if((dx*dx)/(rx*rx)+(dy*dy)/(ry*ry)<=1.0) setPixel(grid,cx+dx,cy+dy,val);
}

function generateShape(shape, g=16) {
  const grid = Array.from({length:g}, ()=>new Uint8Array(g));
  const half = Math.floor(g/2);
  switch(shape) {
    case 'bipedal': {
      fillEllipse(grid,half,4,4,3,2); fillEllipse(grid,half,4,3,2,3);
      fillEllipse(grid,half,9,3,4,2); fillEllipse(grid,half,9,2,3,7);
      fillRect(grid,half-3,13,2,3,2); fillRect(grid,half+2,13,2,3,2);
      setPixel(grid,half-4,8,2); setPixel(grid,half-4,9,2);
      setPixel(grid,half+4,8,2); setPixel(grid,half+4,9,2);
      setPixel(grid,half-2,3,5); setPixel(grid,half+2,3,5);
      setPixel(grid,half-2,2,9); setPixel(grid,half+2,2,9);
      setPixel(grid,half,5,8); break;
    }
    case 'quadruped': {
      fillEllipse(grid,half,5,3,3,2); fillEllipse(grid,half,5,2,2,3);
      fillEllipse(grid,half,9,5,3,2); fillEllipse(grid,half,9,4,2,7);
      fillRect(grid,half-4,12,2,4,2); fillRect(grid,half-1,12,2,4,2);
      fillRect(grid,half+1,12,2,4,8); fillRect(grid,half+3,12,2,4,8);
      setPixel(grid,half-2,4,5); setPixel(grid,half+2,4,5);
      setPixel(grid,half-2,3,9); setPixel(grid,half+2,3,9); break;
    }
    case 'amorphous': {
      fillEllipse(grid,half,7,5,6,2); fillEllipse(grid,half,7,4,5,3);
      fillEllipse(grid,half,7,3,4,7);
      setPixel(grid,half-3,1,2); setPixel(grid,half-4,2,2);
      setPixel(grid,half+3,2,2); setPixel(grid,half+4,3,2);
      setPixel(grid,half-5,5,2); setPixel(grid,half+5,4,2);
      setPixel(grid,half-2,5,5); setPixel(grid,half+1,6,5); setPixel(grid,half,4,5);
      setPixel(grid,half-2,4,9); setPixel(grid,half+1,5,9);
      fillRect(grid,half-1,9,3,1,8); break;
    }
    default: {
      fillEllipse(grid,half,half,5,5,2); fillEllipse(grid,half,half,4,4,3);
      setPixel(grid,half-2,half-1,5); setPixel(grid,half+2,half-1,5); break;
    }
  }
  return grid;
}

function generateBackShape(shape, g=16) {
  const grid = Array.from({length:g}, ()=>new Uint8Array(g));
  const half = Math.floor(g/2);
  switch(shape) {
    case 'bipedal': {
      fillEllipse(grid,half,4,4,3,2); fillEllipse(grid,half,4,3,2,8);
      fillEllipse(grid,half,9,3,4,2);
      fillRect(grid,half-3,13,2,3,2); fillRect(grid,half+2,13,2,3,2);
      setPixel(grid,half-4,8,2); setPixel(grid,half-4,9,2);
      setPixel(grid,half+4,8,2); setPixel(grid,half+4,9,2); break;
    }
    case 'quadruped': {
      fillEllipse(grid,half,5,3,2,2); fillEllipse(grid,half,5,2,1,8);
      fillEllipse(grid,half,9,5,3,2);
      fillRect(grid,half-4,12,2,4,2); fillRect(grid,half-1,12,2,4,2);
      fillRect(grid,half+1,12,2,4,8); fillRect(grid,half+3,12,2,4,8); break;
    }
    case 'amorphous': {
      fillEllipse(grid,half,7,5,6,2); fillEllipse(grid,half,7,4,5,8);
      setPixel(grid,half-3,1,2); setPixel(grid,half+3,2,2); break;
    }
    default: {
      fillEllipse(grid,half,half,5,5,2); fillEllipse(grid,half,half,4,4,8); break;
    }
  }
  return grid;
}

function applyFeatures(grid, features, g) {
  const half = Math.floor(g/2);
  for (const feat of features) {
    switch(feat) {
      case 'horns':
        setPixel(grid,half-2,0,4); setPixel(grid,half-3,0,8);
        setPixel(grid,half+2,0,4); setPixel(grid,half+3,0,8);
        setPixel(grid,half-2,1,4); setPixel(grid,half+2,1,4); break;
      case 'tail':
        for(let i=0;i<4;i++) setPixel(grid,half+3+i,11+Math.floor(i*0.5),i<2?2:4);
        break;
      case 'fangs':
        setPixel(grid,half-1,6,6); setPixel(grid,half+1,6,6); break;
      case 'claws':
        setPixel(grid,half-5,10,6); setPixel(grid,half-5,11,6);
        setPixel(grid,half+5,10,6); setPixel(grid,half+5,11,6); break;
      case 'spikes':
        setPixel(grid,half,0,4); setPixel(grid,half-3,1,4);
        setPixel(grid,half+3,1,4); setPixel(grid,half-4,5,4); setPixel(grid,half+4,5,4); break;
      case 'aura':
        for(let y=0;y<g;y++) for(let x=0;x<g;x++) {
          if(grid[y][x]!==0) {
            for(const [dx,dy] of [[-1,0],[1,0],[0,-1],[0,1]]) {
              const nx=x+dx,ny=y+dy;
              if(nx>=0&&nx<g&&ny>=0&&ny<g&&grid[ny][nx]===0&&(x*7+y*13+dx*3+dy*5)%5===0) grid[ny][nx]=4;
            }
          }
        }
        break;
      case 'steam':
        // 커스텀: 김 올라오는 효과
        setPixel(grid,half-1,0,4); setPixel(grid,half+1,0,4); setPixel(grid,half,1,4);
        setPixel(grid,half-2,1,4); setPixel(grid,half+2,1,4);
        break;
    }
  }
}

function addOutline(grid, g) {
  const out = Array.from({length:g}, ()=>new Uint8Array(g));
  for(let y=0;y<g;y++) for(let x=0;x<g;x++) out[y][x]=grid[y][x];
  for(let y=0;y<g;y++) for(let x=0;x<g;x++) {
    if(grid[y][x]!==0) continue;
    for(const [dx,dy] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      const nx=x+dx,ny=y+dy;
      if(nx>=0&&nx<g&&ny>=0&&ny<g&&grid[ny][nx]!==0&&grid[ny][nx]!==1) { out[y][x]=1; break; }
    }
  }
  return out;
}

function renderToCanvas(canvas, config, size, isBack=false) {
  const g = 16;
  let grid = isBack ? generateBackShape(config.shape, g) : generateShape(config.shape, g);
  if (!isBack) applyFeatures(grid, config.features||[], g);
  grid = addOutline(grid, g);

  const palette = buildPalette(config.baseColor, config.accentColor);
  const ctx = canvas.getContext('2d');
  canvas.width = size; canvas.height = size;
  const px = size / g;
  const colorMap = {
    0:null, 1:palette.darkOutline, 2:palette.base, 3:palette.baseLight,
    4:palette.accent, 5:palette.eye, 6:palette.highlight, 7:palette.belly,
    8:palette.accentDark, 9:palette.eyeShine,
  };
  for(let y=0;y<g;y++) for(let x=0;x<g;x++) {
    const c=colorMap[grid[y][x]];
    if(c) { ctx.fillStyle=c; ctx.fillRect(Math.floor(x*px),Math.floor(y*px),Math.ceil(px),Math.ceil(px)); }
  }
}

// ── 샘플 몬스터 데이터 ──

const sampleMonsters = [
  {
    name: "고랭",
    type: ["fire", "normal"],
    description: "뜨거운 프라이팬 위에서 태어난 볶음 몬스터. 항상 지글지글 소리를 내며 주변 온도를 높인다.",
    baseStats: { hp: 48, atk: 55, def: 45, spAtk: 50, spDef: 42, speed: 60 },
    spriteConfig: {
      baseColor: "#D4740A",
      accentColor: "#FF4500",
      shape: "amorphous",
      features: ["steam"]
    }
  },
  {
    name: "나시고랭",
    type: ["fire", "fighting"],
    description: "고랭이 온갖 양념과 재료를 흡수하며 진화한 형태. 볶음의 달인으로, 화염을 자유자재로 다룬다.",
    baseStats: { hp: 72, atk: 85, def: 65, spAtk: 80, spDef: 60, speed: 78 },
    spriteConfig: {
      baseColor: "#B8520A",
      accentColor: "#FF6600",
      shape: "bipedal",
      features: ["horns", "claws", "aura"]
    }
  }
];

// ── 렌더링 ──

const container = document.getElementById('monsters');

for (const mon of sampleMonsters) {
  const card = document.createElement('div');
  card.className = 'card';

  const typeNames = { fire: '🔥 불', normal: '⚪ 노말', fighting: '🥊 격투' };
  const typeStr = mon.type.map(t => typeNames[t] || t).join(' / ');

  card.innerHTML = `
    <h2>${mon.name}</h2>
    <div class="type">${typeStr}</div>
    <div class="sprites">
      <div><canvas id="front-${mon.name}" style="width:128px;height:128px;"></canvas><label>앞모습</label></div>
      <div><canvas id="back-${mon.name}" style="width:128px;height:128px;"></canvas><label>뒷모습</label></div>
      <div><canvas id="front-big-${mon.name}" style="width:192px;height:192px;"></canvas><label>확대</label></div>
    </div>
    <div class="desc">"${mon.description}"</div>
    <div class="stats">
      <span>HP</span> ${mon.baseStats.hp} | <span>공격</span> ${mon.baseStats.atk} | <span>방어</span> ${mon.baseStats.def}<br>
      <span>특공</span> ${mon.baseStats.spAtk} | <span>특방</span> ${mon.baseStats.spDef} | <span>스피드</span> ${mon.baseStats.speed}
    </div>
  `;
  container.appendChild(card);

  renderToCanvas(document.getElementById(`front-${mon.name}`), mon.spriteConfig, 128);
  renderToCanvas(document.getElementById(`back-${mon.name}`), mon.spriteConfig, 128, true);
  renderToCanvas(document.getElementById(`front-big-${mon.name}`), mon.spriteConfig, 192);
}
</script>
</body>
</html>
