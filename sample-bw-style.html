<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>포켓몬 BW 스타일 스프라이트 - 고랭 & 나시고랭</title>
<style>
  body {
    background: #1a1a2e; color: #eee; font-family: 'Noto Sans KR', sans-serif;
    display: flex; flex-direction: column; align-items: center; padding: 40px;
  }
  h1 { color: #FFD700; margin-bottom: 6px; }
  .sub { color: #888; font-size: 13px; margin-bottom: 40px; }
  .monsters { display: flex; gap: 50px; flex-wrap: wrap; justify-content: center; }
  .card {
    background: #16213e; border: 2px solid #0f3460; border-radius: 16px;
    padding: 24px; text-align: center; min-width: 300px;
  }
  .card h2 { color: #e94560; margin: 0 0 4px; font-size: 22px; }
  .type { color: #aaa; font-size: 13px; margin-bottom: 16px; }
  .sprites { display: flex; gap: 16px; justify-content: center; align-items: flex-end; margin: 16px 0; }
  .sprites div { text-align: center; }
  .sprites label { display: block; font-size: 11px; color: #666; margin-top: 4px; }
  canvas { image-rendering: pixelated; image-rendering: crisp-edges; background: #f8f8f0; border: 1px solid #333; }
  .desc { color: #bbb; font-size: 12px; margin-top: 14px; font-style: italic; }
</style>
</head>
<body>
<h1>포켓몬 BW 스타일 스프라이트</h1>
<p class="sub">64x64 · 두꺼운 외곽선 · 3~4톤 셰이딩</p>

<div class="monsters" id="monsters"></div>

<script>
// ── BW 스타일 스프라이트 드로잉 엔진 ──

function createSprite(width, height) {
  const c = document.createElement('canvas');
  c.width = width; c.height = height;
  return { canvas: c, ctx: c.getContext('2d') };
}

// 픽셀 단위 원 (안티앨리어싱 없이)
function pixelEllipse(ctx, cx, cy, rx, ry, color) {
  ctx.fillStyle = color;
  for (let y = -ry; y <= ry; y++) {
    for (let x = -rx; x <= rx; x++) {
      if ((x*x)/(rx*rx) + (y*y)/(ry*ry) <= 1.0) {
        ctx.fillRect(cx+x, cy+y, 1, 1);
      }
    }
  }
}

function pixelRect(ctx, x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
}

function px(ctx, x, y, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, 1, 1);
}

// 두꺼운 외곽선 자동 생성 (BW 스타일 핵심)
function addBWOutline(canvas, outlineColor='#282828', thickness=2) {
  const w = canvas.width, h = canvas.height;
  const ctx = canvas.getContext('2d');
  const src = ctx.getImageData(0, 0, w, h);
  const dst = ctx.createImageData(w, h);
  // 원본 복사
  dst.data.set(src.data);

  const isOpaque = (x, y) => {
    if (x < 0 || x >= w || y < 0 || y >= h) return false;
    return src.data[(y * w + x) * 4 + 3] > 0;
  };

  const r = parseInt(outlineColor.slice(1,3),16);
  const g = parseInt(outlineColor.slice(3,5),16);
  const b = parseInt(outlineColor.slice(5,7),16);

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      if (isOpaque(x, y)) continue;
      let near = false;
      for (let dy = -thickness; dy <= thickness && !near; dy++) {
        for (let dx = -thickness; dx <= thickness && !near; dx++) {
          if (dx*dx + dy*dy <= thickness*thickness && isOpaque(x+dx, y+dy)) {
            near = true;
          }
        }
      }
      if (near) {
        const i = (y * w + x) * 4;
        dst.data[i] = r; dst.data[i+1] = g; dst.data[i+2] = b; dst.data[i+3] = 255;
      }
    }
  }
  ctx.putImageData(dst, 0, 0);
}

// 내부 경계선 (BW 스타일 디테일 라인)
function addInnerLine(ctx, x1, y1, x2, y2, color='#282828') {
  ctx.fillStyle = color;
  const dx = Math.abs(x2-x1), dy = Math.abs(y2-y1);
  const sx = x1<x2?1:-1, sy = y1<y2?1:-1;
  let err = dx-dy, cx=x1, cy=y1;
  while(true) {
    ctx.fillRect(cx, cy, 1, 1);
    if(cx===x2 && cy===y2) break;
    const e2=2*err;
    if(e2>-dy){err-=dy;cx+=sx;}
    if(e2<dx){err+=dx;cy+=sy;}
  }
}

// ══════════════════════════════════════
//  고랭 (Goreng) — 볶음밥 덩어리 몬스터
// ══════════════════════════════════════
function drawGorengFront() {
  const { canvas, ctx } = createSprite(64, 64);

  // 색상 팔레트 (BW 스타일 4톤)
  const C = {
    body:     '#E08830',  // 베이스
    bodyLt:   '#F0A850',  // 밝은
    bodyDk:   '#B06018',  // 어두운
    bodySh:   '#884010',  // 그림자
    belly:    '#F5D090',  // 배 (밝은 크림)
    bellyDk:  '#E0B868',
    accent:   '#E83820',  // 빨강 (볼, 양념)
    accentDk: '#C02010',
    rice:     '#FFF8E0',  // 밥알
    riceSh:   '#E8D8B0',
    eye:      '#181818',
    eyeW:     '#FFFFFF',
    mouth:    '#C02010',
    steam:    '#D0D0D0',
    steamLt:  '#E8E8E8',
  };

  // 김 (steam) — 위쪽에 부드럽게
  ctx.fillStyle = C.steamLt;
  [
    [28,2],[29,1],[30,3],[33,1],[34,2],[35,4],[31,5],[32,4],
    [27,4],[36,3],
  ].forEach(([x,y]) => ctx.fillRect(x,y,2,2));

  ctx.fillStyle = C.steam;
  [[29,3],[30,1],[33,3],[34,0],[31,2],[32,6]].forEach(([x,y]) => ctx.fillRect(x,y,1,2));

  // 몸체 — 큰 둥근 덩어리
  pixelEllipse(ctx, 32, 38, 18, 18, C.bodySh);   // 그림자
  pixelEllipse(ctx, 32, 36, 18, 18, C.bodyDk);    // 어두운 톤
  pixelEllipse(ctx, 32, 35, 17, 17, C.body);      // 메인
  pixelEllipse(ctx, 31, 33, 14, 14, C.bodyLt);    // 밝은 부분 (좌상단 하이라이트)

  // 배 (밝은 크림색 타원)
  pixelEllipse(ctx, 32, 40, 11, 10, C.bellyDk);
  pixelEllipse(ctx, 32, 39, 10, 9, C.belly);

  // 밥알 패턴 (배 위에)
  ctx.fillStyle = C.rice;
  [[26,36,3,2],[30,34,2,3],[35,37,3,2],[28,41,2,2],[33,40,3,2],[37,35,2,3],[25,39,2,2],[31,43,2,2]].forEach(
    ([x,y,w,h]) => ctx.fillRect(x,y,w,h)
  );
  ctx.fillStyle = C.riceSh;
  [[27,38,2,1],[31,37,1,1],[36,39,1,1],[29,43,1,1],[34,42,1,1]].forEach(
    ([x,y,w,h]) => ctx.fillRect(x,y,w,h)
  );

  // 양념 조각 (빨강/초록 점)
  ctx.fillStyle = C.accent;
  [[29,37,2,1],[34,35,1,2],[26,42,2,1],[36,41,1,2]].forEach(([x,y,w,h])=>ctx.fillRect(x,y,w,h));
  ctx.fillStyle = '#40A030';
  [[32,36,1,2],[27,40,2,1],[35,43,2,1]].forEach(([x,y,w,h])=>ctx.fillRect(x,y,w,h));

  // 눈 — BW 스타일 큰 눈
  // 왼쪽 눈
  pixelEllipse(ctx, 25, 28, 5, 5, C.eye);
  pixelEllipse(ctx, 25, 28, 4, 4, C.eyeW);
  pixelEllipse(ctx, 25, 28, 3, 3, C.eye);
  // 하이라이트
  pixelRect(ctx, 23, 26, 2, 2, C.eyeW);
  px(ctx, 27, 30, C.eyeW);

  // 오른쪽 눈
  pixelEllipse(ctx, 39, 28, 5, 5, C.eye);
  pixelEllipse(ctx, 39, 28, 4, 4, C.eyeW);
  pixelEllipse(ctx, 39, 28, 3, 3, C.eye);
  pixelRect(ctx, 37, 26, 2, 2, C.eyeW);
  px(ctx, 41, 30, C.eyeW);

  // 볼 (빨간 동그라미)
  pixelEllipse(ctx, 20, 33, 3, 2, C.accent);
  pixelEllipse(ctx, 44, 33, 3, 2, C.accent);

  // 입 — 작은 w 모양
  ctx.fillStyle = C.mouth;
  [[30,35],[31,36],[32,35],[33,36],[34,35]].forEach(([x,y])=>ctx.fillRect(x,y,1,1));

  // 작은 팔 (양옆)
  pixelEllipse(ctx, 13, 38, 3, 4, C.bodyDk);
  pixelEllipse(ctx, 13, 37, 3, 3, C.body);
  pixelEllipse(ctx, 51, 38, 3, 4, C.bodyDk);
  pixelEllipse(ctx, 51, 37, 3, 3, C.body);

  // 작은 발
  pixelEllipse(ctx, 26, 54, 4, 3, C.bodySh);
  pixelEllipse(ctx, 26, 53, 4, 2, C.bodyDk);
  pixelEllipse(ctx, 38, 54, 4, 3, C.bodySh);
  pixelEllipse(ctx, 38, 53, 4, 2, C.bodyDk);

  // BW 스타일 두꺼운 외곽선
  addBWOutline(canvas, '#282828', 2);

  return canvas;
}

// ══════════════════════════════════════
//  나시고랭 (Nasi Goreng) — 진화형
// ══════════════════════════════════════
function drawNasiGorengFront() {
  const { canvas, ctx } = createSprite(64, 64);

  const C = {
    body:     '#C05818',
    bodyLt:   '#D87830',
    bodyDk:   '#903808',
    bodySh:   '#682808',
    belly:    '#F0C878',
    bellyDk:  '#D8A850',
    accent:   '#FF5500',
    accentDk: '#CC3300',
    accentLt: '#FF8844',
    rice:     '#FFF8E0',
    riceSh:   '#E0D0A0',
    eye:      '#181818',
    eyeW:     '#FFFFFF',
    eyeR:     '#E02020',  // 강한 눈
    mouth:    '#881010',
    pan:      '#484848',
    panLt:    '#686868',
    panDk:    '#303030',
    fire:     '#FF4400',
    fireY:    '#FFD800',
    scarf:    '#E02020',
    scarfDk:  '#A01010',
  };

  // 양념 뿔 (2개)
  ctx.fillStyle = C.accent;
  // 왼쪽 뿔
  [[24,6],[23,4],[22,2],[21,0],[25,5],[24,3],[23,1]].forEach(([x,y])=>ctx.fillRect(x,y,2,2));
  ctx.fillStyle = C.accentDk;
  [[22,1],[23,3],[24,5]].forEach(([x,y])=>ctx.fillRect(x,y,1,2));
  // 오른쪽 뿔
  ctx.fillStyle = C.accent;
  [[38,6],[39,4],[40,2],[41,0],[37,5],[38,3],[39,1]].forEach(([x,y])=>ctx.fillRect(x,y,2,2));
  ctx.fillStyle = C.accentDk;
  [[40,1],[39,3],[38,5]].forEach(([x,y])=>ctx.fillRect(x,y,1,2));

  // 머리
  pixelEllipse(ctx, 32, 14, 11, 8, C.bodySh);
  pixelEllipse(ctx, 32, 13, 11, 8, C.bodyDk);
  pixelEllipse(ctx, 32, 12, 10, 7, C.body);
  pixelEllipse(ctx, 31, 11, 8, 5, C.bodyLt);

  // 머리띠 / 밴드
  pixelRect(ctx, 22, 8, 20, 2, C.scarf);
  pixelRect(ctx, 23, 8, 18, 1, C.scarfDk);

  // 눈 — BW 스타일 크고 날카로운
  // 왼쪽
  pixelEllipse(ctx, 26, 13, 4, 4, C.eye);
  pixelEllipse(ctx, 26, 13, 3, 3, C.eyeW);
  pixelEllipse(ctx, 26, 14, 2, 2, C.eye);
  pixelRect(ctx, 24, 11, 2, 2, C.eyeW);
  px(ctx, 28, 15, '#404040');
  // 오른쪽
  pixelEllipse(ctx, 38, 13, 4, 4, C.eye);
  pixelEllipse(ctx, 38, 13, 3, 3, C.eyeW);
  pixelEllipse(ctx, 38, 14, 2, 2, C.eye);
  pixelRect(ctx, 36, 11, 2, 2, C.eyeW);
  px(ctx, 40, 15, '#404040');

  // 입 — 자신감 있는 삼각 입
  ctx.fillStyle = C.mouth;
  for (let i = 0; i < 4; i++) {
    ctx.fillRect(30+i, 19, 1, 1);
    if (i > 0 && i < 3) ctx.fillRect(30+i, 20, 1, 1);
  }

  // 몸통
  pixelEllipse(ctx, 32, 32, 12, 12, C.bodySh);
  pixelEllipse(ctx, 32, 31, 12, 12, C.bodyDk);
  pixelEllipse(ctx, 32, 30, 11, 11, C.body);

  // 앞치마 / 배
  pixelEllipse(ctx, 32, 33, 8, 9, C.bellyDk);
  pixelEllipse(ctx, 32, 32, 7, 8, C.belly);

  // 밥알 + 양념 패턴 (배 위)
  ctx.fillStyle = C.rice;
  [[28,30,2,2],[33,28,2,2],[36,32,2,1],[29,34,3,1],[34,35,2,2],[27,33,2,1]].forEach(
    ([x,y,w,h])=>ctx.fillRect(x,y,w,h)
  );
  ctx.fillStyle = C.accent;
  [[31,31,1,1],[35,29,1,1],[28,36,1,1]].forEach(([x,y])=>ctx.fillRect(x,y,1,1));
  ctx.fillStyle = '#40A030';
  [[30,29,1,1],[34,33,1,1],[27,35,1,1]].forEach(([x,y])=>ctx.fillRect(x,y,1,1));

  // 왼팔
  pixelEllipse(ctx, 17, 30, 4, 6, C.bodyDk);
  pixelEllipse(ctx, 17, 29, 3, 5, C.body);
  pixelEllipse(ctx, 17, 28, 2, 3, C.bodyLt);
  // 왼손 (주먹)
  pixelEllipse(ctx, 16, 37, 3, 3, C.bodyDk);
  pixelEllipse(ctx, 16, 36, 3, 2, C.body);

  // 오른팔 (프라이팬 들기)
  pixelEllipse(ctx, 47, 28, 4, 5, C.bodyDk);
  pixelEllipse(ctx, 47, 27, 3, 4, C.body);
  pixelEllipse(ctx, 47, 26, 2, 3, C.bodyLt);

  // 프라이팬
  // 손잡이
  pixelRect(ctx, 50, 22, 2, 8, C.panDk);
  pixelRect(ctx, 50, 22, 1, 8, C.pan);
  // 팬 부분
  pixelEllipse(ctx, 56, 18, 6, 4, C.panDk);
  pixelEllipse(ctx, 56, 17, 6, 4, C.pan);
  pixelEllipse(ctx, 56, 17, 5, 3, C.panLt);
  // 팬 위의 불꽃
  ctx.fillStyle = C.fireY;
  [[53,12],[55,11],[57,10],[59,12],[56,13]].forEach(([x,y])=>ctx.fillRect(x,y,2,2));
  ctx.fillStyle = C.fire;
  [[54,10],[56,9],[58,11],[55,13]].forEach(([x,y])=>ctx.fillRect(x,y,1,2));

  // 다리
  // 왼다리
  pixelRect(ctx, 26, 42, 5, 10, C.bodySh);
  pixelRect(ctx, 26, 42, 4, 9, C.bodyDk);
  pixelRect(ctx, 27, 42, 3, 8, C.body);
  // 오른다리
  pixelRect(ctx, 34, 42, 5, 10, C.bodySh);
  pixelRect(ctx, 34, 42, 4, 9, C.bodyDk);
  pixelRect(ctx, 35, 42, 3, 8, C.body);
  // 발
  pixelEllipse(ctx, 27, 53, 4, 2, C.bodySh);
  pixelEllipse(ctx, 27, 52, 4, 2, C.bodyDk);
  pixelEllipse(ctx, 38, 53, 4, 2, C.bodySh);
  pixelEllipse(ctx, 38, 52, 4, 2, C.bodyDk);

  // 스카프 / 목도리 (요리사 느낌)
  pixelRect(ctx, 24, 21, 20, 3, C.scarf);
  pixelRect(ctx, 25, 22, 18, 1, C.scarfDk);
  // 매듭
  pixelEllipse(ctx, 32, 24, 3, 2, C.scarf);
  pixelEllipse(ctx, 32, 25, 2, 2, C.scarfDk);

  // BW 외곽선
  addBWOutline(canvas, '#282828', 2);

  return canvas;
}

// ── 렌더링 ──
const container = document.getElementById('monsters');

const sprites = [
  {
    name: '고랭',
    type: '🔥 불 / ⚪ 노말',
    desc: '뜨거운 프라이팬 위에서 태어난 볶음 몬스터. 항상 지글지글 소리를 내며 주변 온도를 높인다.',
    draw: drawGorengFront,
  },
  {
    name: '나시고랭',
    type: '🔥 불 / 🥊 격투',
    desc: '고랭이 온갖 양념과 재료를 흡수하며 진화한 형태. 프라이팬을 무기로 휘두르는 볶음의 달인.',
    draw: drawNasiGorengFront,
  },
];

for (const mon of sprites) {
  const srcCanvas = mon.draw();
  const card = document.createElement('div');
  card.className = 'card';

  card.innerHTML = `
    <h2>${mon.name}</h2>
    <div class="type">${mon.type}</div>
    <div class="sprites">
      <div><canvas class="s1x" width="64" height="64" style="width:64px;height:64px;"></canvas><label>1x (64px)</label></div>
      <div><canvas class="s2x" width="64" height="64" style="width:128px;height:128px;"></canvas><label>2x</label></div>
      <div><canvas class="s3x" width="64" height="64" style="width:192px;height:192px;"></canvas><label>3x</label></div>
    </div>
    <div class="desc">"${mon.desc}"</div>
  `;
  container.appendChild(card);

  // 각 크기에 복사
  for (const cls of ['s1x','s2x','s3x']) {
    const target = card.querySelector(`.${cls}`);
    target.getContext('2d').drawImage(srcCanvas, 0, 0);
  }
}
</script>
</body>
</html>
