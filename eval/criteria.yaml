# 평가 기준 정의
# 도메인별 프리셋에 의해 오버라이드 가능

severity_definitions:
  blocker:
    description: "기능이 아예 작동하지 않음"
    action: "Generator 재호출 필수"
    auto_fail: true
  major:
    description: "기능은 작동하나 명백한 결함"
    action: "Generator 재호출 권장"
    auto_fail: true
  minor:
    description: "개선 사항"
    action: "다음 스프린트에서 처리 가능"
    auto_fail: false

pass_conditions:
  blocker_count: 0
  major_count: 0
  min_tool_executions: 3
  evidence_required: true         # 모든 완료 조건에 1개 이상 증거

escalation_schedule:
  functionality:
    rounds: "1-3"
    focus: "각 기능의 정상 동작 여부"
    checks:
      - "입력 → 출력 경로 연결"
      - "기본 시나리오 동작"
  quality:
    rounds: "4-6"
    focus: "코드 품질과 안정성"
    checks:
      - "에러 핸들링 존재"
      - "엣지 케이스 크래시 없음"
      - "매직 넘버 없음"
  polish:
    rounds: "7-9"
    focus: "사용자 경험과 성능"
    checks:
      - "UX 자연스러움"
      - "성능 허용 범위"
      - "상태 피드백 존재"
  pivot_check:
    rounds: "10"
    focus: "방향 전환 필요성 판단"
    checks:
      - "최근 3회 개선 폭 감소 여부"
      - "구조적 한계 존재 여부"
